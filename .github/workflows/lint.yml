name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black flake8 isort mypy safety

      - name: Black (format check)
        run: black --check backend/app

      - name: Flake8 (lint)
        run: flake8 backend/app --max-line-length=100

      - name: isort (import order)
        run: isort --check-only --profile black backend/app

      - name: MyPy (type checking)
        run: mypy backend/app

      - name: Safety (dependency check)
        run: safety check -r backend/requirements.txt
